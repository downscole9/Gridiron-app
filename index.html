<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GRIDIRON // Football Intelligence Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-void: #0A0C10;
    --bg-panel: #12161D;
    --bg-panel-raised: #171C24;
    --hairline: #262B33;
    --hairline-bright: #3A4150;
    --text-primary: #E4E7EB;
    --text-secondary: #8B95A1;
    --text-muted: #545C68;
    --accent-amber: #E8A93B;
    --accent-amber-dim: #6b5726;
    --signal-green: #3FBF7F;
    --signal-green-dim: #1c3d2c;
    --signal-red: #E85D5D;
    --signal-red-dim: #3d2222;
    --signal-blue: #5B9DD9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-void); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  .ticker-wrap { background: #000; border-bottom: 1px solid var(--hairline); overflow: hidden; white-space: nowrap; padding: 7px 0; }
  .ticker-track { display: inline-block; animation: scroll-left 42s linear infinite; }
  .ticker-item { display: inline-flex; align-items: center; gap: 8px; padding: 0 22px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .ticker-item .name { color: var(--text-secondary); }
  @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--hairline); flex-wrap: wrap; gap: 10px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 26px; height: 26px; background: var(--accent-amber); clip-path: polygon(0 100%, 50% 0, 100% 100%); }
  .brand-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; }
  .brand-text span { color: var(--accent-amber); }
  .brand-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: -2px; }
  .clock { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: right; }
  .clock .status { color: var(--signal-green); }

  .app { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 90px); }
  @media (max-width: 900px) { .app { grid-template-columns: 1fr; } }

  .view-tabs { display: flex; gap: 2px; padding: 0 28px; border-bottom: 1px solid var(--hairline); background: var(--bg-panel); }
  .view-tab { padding: 12px 18px; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; font-family: 'IBM Plex Mono', monospace; }
  .view-tab:hover { color: var(--text-secondary); }
  .view-tab.active { color: var(--accent-amber); border-bottom-color: var(--accent-amber); }

  .proj-toolbar { display: flex; gap: 10px; padding: 16px 28px; border-bottom: 1px solid var(--hairline); flex-wrap: wrap; align-items: center; }
  .proj-search { background: var(--bg-panel); border: 1px solid var(--hairline); color: var(--text-primary); padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none; min-width: 220px; }
  .proj-search:focus { border-color: var(--accent-amber); }
  .proj-note { padding: 14px 28px; font-size: 12px; color: var(--text-muted); line-height: 1.6; border-bottom: 1px solid var(--hairline); background: var(--bg-panel); }

  table.proj { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }
  table.proj th { text-align: left; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; padding: 10px 16px; border-bottom: 1px solid var(--hairline-bright); position: sticky; top: 0; background: var(--bg-void); }
  table.proj td { padding: 10px 16px; border-bottom: 1px solid var(--hairline); color: var(--text-secondary); }
  table.proj tr:hover td { background: var(--bg-panel); color: var(--text-primary); }
  table.proj td.name-cell { color: var(--text-primary); font-weight: 500; }
  table.proj td.proj-pts { color: var(--accent-amber); font-weight: 600; font-size: 13.5px; }
  .flag-changed { display:inline-block; font-size:9.5px; color: var(--signal-red); border: 1px solid var(--signal-red-dim); padding: 1px 6px; margin-left: 6px; }
  .flag-nodata { color: var(--text-muted); font-style: italic; }

  .rail { border-right: 1px solid var(--hairline); padding: 20px; max-height: calc(100vh - 90px); overflow-y: auto; }
  .rail-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display:flex; justify-content:space-between; }
  .search-box { position: relative; margin-bottom: 14px; }
  .search-box input { width: 100%; background: var(--bg-panel); border: 1px solid var(--hairline); color: var(--text-primary); padding: 10px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none; }
  .search-box input:focus { border-color: var(--accent-amber); }
  .search-box input::placeholder { color: var(--text-muted); }

  .pos-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .pos-chip { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; padding: 4px 9px; border: 1px solid var(--hairline); color: var(--text-secondary); cursor: pointer; user-select: none; }
  .pos-chip.active { border-color: var(--accent-amber); color: var(--accent-amber); }

  .player-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 10px; border-bottom: 1px solid var(--hairline); cursor: pointer; transition: background 0.12s ease; }
  .player-list-item:hover { background: var(--bg-panel); }
  .player-list-item.active { background: var(--bg-panel-raised); border-left: 2px solid var(--accent-amber); }
  .pl-name { font-size: 13px; font-weight: 500; }
  .pl-meta { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; }
  .pl-grade { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 14px; }
  .g-green{color:var(--signal-green)} .g-amber{color:var(--accent-amber)} .g-muted{color:var(--text-secondary)} .g-red{color:var(--signal-red)}

  .rail-footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--hairline); font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  .rail-footer b { color: var(--text-secondary); }
  .rail-count { font-family: 'IBM Plex Mono', monospace; color: var(--text-muted); }

  .main { padding: 24px 28px 60px; }
  .pd-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; flex-wrap: wrap; gap: 14px; }
  .pd-name { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; }
  .pd-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  .pd-week { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .stat-strip { display: grid; grid-template-columns: repeat(5, 1fr); border: 1px solid var(--hairline); margin-bottom: 20px; }
  .stat-cell { padding: 16px 18px; border-right: 1px solid var(--hairline); }
  .stat-cell:last-child { border-right: none; }
  .stat-cell-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .stat-cell-value { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 600; }
  .stat-cell-value.grade { color: var(--signal-green); }
  .stat-cell-value.amber { color: var(--accent-amber); }
  .stat-cell-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

  .panel { border: 1px solid var(--hairline); margin-bottom: 20px; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--hairline); background: var(--bg-panel); }
  .panel-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); font-weight: 600; }
  .panel-tag { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--signal-green); border: 1px solid var(--signal-green-dim); padding: 2px 8px; }
  .panel-body { padding: 18px; }

  .ai-report p { font-size: 14.5px; line-height: 1.75; color: var(--text-primary); }

  .ladder-row { display: grid; grid-template-columns: 70px 1fr 60px; align-items: center; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--hairline); }
  .ladder-row:last-child { border-bottom: none; }
  .ladder-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-secondary); }
  .ladder-track { height: 16px; background: var(--bg-panel); position: relative; overflow: hidden; }
  .ladder-fill { height: 100%; background: linear-gradient(90deg, var(--signal-blue), var(--accent-amber)); }
  .ladder-fill.bust { background: linear-gradient(90deg, var(--signal-red), #a83a3a); }
  .ladder-pct { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; text-align: right; }

  table.sg { width: 100%; border-collapse: collapse; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }
  table.sg th { text-align: left; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--hairline-bright); }
  table.sg td { padding: 9px 12px; border-bottom: 1px solid var(--hairline); color: var(--text-secondary); }
  table.sg tr:hover td { background: var(--bg-panel); color: var(--text-primary); }
  table.sg td.pts { color: var(--signal-green); font-weight: 600; }
  table.sg td.pts.neg { color: var(--signal-red); }

  .highlight-row { display:grid; grid-template-columns: 1fr 1fr; gap:1px; background:var(--hairline); }
  .hl-cell { background: var(--bg-void); padding:14px 16px; }
  .hl-label { font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;}
  .hl-value { font-family:'IBM Plex Mono', monospace; font-size:15px; }
  .hl-value b { color: var(--signal-green); }
  .hl-value.worst b { color: var(--signal-red); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-void); }
  ::-webkit-scrollbar-thumb { background: var(--hairline-bright); }
  @media (prefers-reduced-motion: reduce) { .ticker-track { animation: none; } }

  @media (max-width: 700px) {
    .stat-strip { grid-template-columns: repeat(2, 1fr); }
    .stat-cell { border-bottom: 1px solid var(--hairline); }
    .stat-cell:nth-child(odd) { border-right: 1px solid var(--hairline); }
    .stat-cell-value { font-size: 20px; }
    .matchup-grid { grid-template-columns: repeat(2, 1fr); }
    .highlight-row { grid-template-columns: 1fr; }
    .view-tab { padding: 10px 12px; font-size: 10.5px; }
    .pd-name { font-size: 24px; }
    table.sg, table.proj { font-size: 11px; }
    table.sg th, table.sg td, table.proj th, table.proj td { padding: 8px 8px; white-space: nowrap; }
    .rail { max-height: none; }
    .app { grid-template-columns: 1fr; }
    .scroll-hint { display: block; }
  }
  .scroll-hint { display: none; font-size: 10px; color: var(--text-muted); padding: 6px 16px; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <div class="brand-text">GRID<span>IRON</span></div>
      <div class="brand-sub">Football Intelligence Terminal</div>
    </div>
  </div>
  <div class="clock">
    <div><span class="status">●</span> 2024 SEASON · REAL DATA</div>
    <div style="margin-top:2px;">SOURCE: nflverse (public, free)</div>
  </div>
</div>

<div class="view-tabs">
  <div class="view-tab active" data-view="profiles">Player Profiles</div>
  <div class="view-tab" data-view="projections">Week 1 2026 Projections</div>
</div>

<div class="app" id="appGrid"></div>

<script>
let SEARCH_INDEX = [];
let PLAYER_DATA = {};
let PROJECTIONS = null;

let activeView = 'profiles';
let activeName = null;
let activeFilter = 'ALL';
let searchQuery = '';

let projFilter = 'ALL';
let projSearchQuery = '';
let projSort = 'proj_desc';

const POSITIONS = ['ALL','QB','RB','WR','TE','K','DEF'];

function gradeClass(g) {
  if (!g || g === '—') return 'g-muted';
  if (g.startsWith('A')) return 'g-green';
  if (g === 'B') return 'g-amber';
  if (g === 'C') return 'g-muted';
  return 'g-red';
}

function buildTicker() {
  const top = [...SEARCH_INDEX].sort((a,b)=>b.avg-a.avg).slice(0,16);
  const track = document.getElementById('tickerTrack');
  const items = top.concat(top).map(t => `
    <span class="ticker-item">
      <span class="name">${t.name} · ${t.position}</span>
      <span class="${gradeClass(t.grade)}" style="font-weight:600;">${t.grade}</span>
      <span class="mono" style="color:var(--text-muted)">${t.avg} avg</span>
    </span>
  `).join('');
  track.innerHTML = items;
}

function buildPosFilters() {
  const el = document.getElementById('posFilters');
  el.innerHTML = POSITIONS.map(p => `<div class="pos-chip ${p===activeFilter?'active':''}" data-pos="${p}">${p}</div>`).join('');
  el.querySelectorAll('.pos-chip').forEach(chip => {
    chip.addEventListener('click', () => { activeFilter = chip.dataset.pos; buildRail(); });
  });
}

function buildRail() {
  let list = SEARCH_INDEX;
  if (activeFilter !== 'ALL') list = list.filter(p => p.position === activeFilter);
  if (searchQuery) list = list.filter(p => p.name.toLowerCase().includes(searchQuery));
  document.getElementById('railCount').textContent = list.length + ' / ' + SEARCH_INDEX.length;
  const shown = list.slice(0, 60);
  const container = document.getElementById('playerList');
  container.innerHTML = shown.map(p => `
    <div class="player-list-item ${p.name===activeName?'active':''}" data-name="${p.name}">
      <div>
        <div class="pl-name">${p.name}</div>
        <div class="pl-meta">${p.position} · ${p.team} · ${p.no_baseline_data ? 'no data yet' : ('#'+p.rank+'/'+p.of)}</div>
      </div>
      <div class="pl-grade ${gradeClass(p.grade)}">${p.grade}</div>
    </div>
  `).join('') + (list.length > 60 ? `<div style="padding:10px;font-size:11px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;">+${list.length-60} more — refine search</div>` : '');
  container.querySelectorAll('.player-list-item').forEach(el => {
    el.addEventListener('click', () => { activeName = el.dataset.name; buildRail(); renderProfile(); });
  });
}

function gameLogHeaders(pos) {
  if (pos === 'K') return ['Wk','Opp','FG','FGA','Pts'];
  if (pos === 'DEF') return ['Wk','Opp','Pts Allowed','Sacks','INT','Fum Rec','Def TD','Pts'];
  return ['Wk','Opp','Tgt','Rec','Rec Yds','Rush Yds','Pass Yds','Pass TD','Pts'];
}
function gameLogRow(pos, g) {
  if (pos === 'K') return [g.week, g.opp, g.fg_made, g.fg_att, g.fantasy_ppr];
  if (pos === 'DEF') return [g.week, g.opp, g.pts_allowed, g.sacks, g.ints, g.fum_rec, g.def_tds, g.fantasy_ppr];
  return [g.week, g.opp, g.targets, g.receptions, g.rec_yards, g.rush_yards, g.pass_yards, g.pass_tds, g.fantasy_ppr];
}

function renderProfile() {
  buildPosFilters();
  buildRail();
  const main = document.getElementById('mainPanel');
  if (!activeName) {
    main.innerHTML = `<div style="padding:60px 10px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-size:13px;">Select or search a player / defense from the left to view their real 2024 season profile.</div>`;
    return;
  }
  const p = PLAYER_DATA[activeName];

  if (p.no_baseline_data) {
    main.innerHTML = `
      <div class="pd-header">
        <div>
          <div class="pd-name">${p.name}</div>
          <div class="pd-sub">${p.position} · ${p.team}</div>
        </div>
        <div class="pd-week">Season Profile</div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">No Baseline Data Yet</div>
          <div class="panel-tag" style="color:var(--text-muted);border-color:var(--hairline-bright);">HONEST GAP</div>
        </div>
        <div class="panel-body ai-report">
          <p>${p.name} is on the current ${p.team} roster, but has no season stats in our baseline data (2024) —
          most likely a rookie, a practice-squad addition, or a player who didn't see meaningful action that season.
          Rather than guess, we're showing this honestly instead of a fabricated grade.
          Check the <b>Week 1 2026 Projections</b> tab — they'll still show up there, flagged as "no data,"
          alongside real players you can compare them to.</p>
        </div>
      </div>
    `;
    return;
  }

  const headers = gameLogHeaders(p.position);
  main.innerHTML = `
    <div class="pd-header">
      <div>
        <div class="pd-name">${p.name}</div>
        <div class="pd-sub">${p.position} · ${p.team} · ${p.games_played} games played (2024)</div>
      </div>
      <div class="pd-week">Season Profile</div>
    </div>

    <div class="stat-strip">
      <div class="stat-cell">
        <div class="stat-cell-label">Grade</div>
        <div class="stat-cell-value ${p.grade.startsWith('A')?'grade':'amber'}">${p.grade}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-label">Season Avg</div>
        <div class="stat-cell-value">${p.avg_ppr}</div>
        <div class="stat-cell-sub">pts/game (PPR)</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-label">Position Rank</div>
        <div class="stat-cell-value">#${p.rank}</div>
        <div class="stat-cell-sub">of ${p.rank_of} ${p.position}s</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-label">Boom Rate</div>
        <div class="stat-cell-value" style="color:var(--signal-green)">${p.boom_pct}%</div>
        <div class="stat-cell-sub">games ${p.boom_thr}+ pts</div>
      </div>
      <div class="stat-cell">
        <div class="stat-cell-label">Bust Rate</div>
        <div class="stat-cell-value" style="color:var(--signal-red)">${p.bust_pct}%</div>
        <div class="stat-cell-sub">games under ${p.bust_thr}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Season Summary</div>
        <div class="panel-tag" ${p.ai_narrative ? '' : 'style="color:var(--text-muted);border-color:var(--hairline-bright);"'}>${p.ai_narrative ? 'AI-GENERATED (Claude)' : 'REAL · TEMPLATE'}</div>
      </div>
      <div class="panel-body ai-report"><p>${p.ai_narrative || p.narrative}</p></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Best / Worst Game</div>
        <div class="panel-tag">REAL</div>
      </div>
      <div class="highlight-row">
        <div class="hl-cell">
          <div class="hl-label">Ceiling</div>
          <div class="hl-value">Week ${p.best_game.week} vs ${p.best_game.opp} — <b>${p.best_game.fantasy_ppr} pts</b></div>
        </div>
        <div class="hl-cell">
          <div class="hl-label">Floor</div>
          <div class="hl-value worst">Week ${p.worst_game.week} vs ${p.worst_game.opp} — <b>${p.worst_game.fantasy_ppr} pts</b></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Weekly Point Distribution</div>
        <div class="panel-tag">REAL</div>
      </div>
      <div class="panel-body">
        ${p.ladder.map(l => `
          <div class="ladder-row">
            <div class="ladder-label">${l.label}</div>
            <div class="ladder-track"><div class="ladder-fill ${l.bust?'bust':''}" style="width:${l.pct}%"></div></div>
            <div class="ladder-pct">${l.pct}%</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Full 2024 Game Log</div>
        <div class="panel-tag">REAL · nflverse</div>
      </div>
      <div class="scroll-hint">← Swipe table to see all columns →</div>
      <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
        <table class="sg">
          <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${p.games.map(g => {
              const row = gameLogRow(p.position, g);
              return `<tr>${row.map((v,i)=>`<td class="${i===row.length-1?('pts'+(parseFloat(v)<0?' neg':'')):''}">${v}</td>`).join('')}</tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function profileShellHTML() {
  return `
    <div class="rail">
      <div class="rail-label"><span>Search Player / Team</span><span class="rail-count" id="railCount"></span></div>
      <div class="search-box"><input type="text" id="searchInput" placeholder="e.g. Josh Allen, 49ers Defense..." autocomplete="off"></div>
      <div class="pos-filters" id="posFilters"></div>
      <div id="playerList"></div>
      <div class="rail-footer">
        <b>What's real here</b><br>
        Every number on this page — grade, rank, boom/bust %, game log — is computed live from actual season stats (nflverse). Nothing on this screen is placeholder data anymore.
      </div>
    </div>
    <div class="main" id="mainPanel"></div>
  `;
}

function projGradeClass(g) { return gradeClass(g); }

function buildProjToolbar() {
  return `
    <div class="proj-toolbar">
      <input type="text" class="proj-search" id="projSearch" placeholder="Search player or team..." autocomplete="off">
      <div class="pos-filters" id="projPosFilters"></div>
    </div>
  `;
}

function projectionsShellHTML() {
  if (!PROJECTIONS) {
    return `<div style="padding:60px 28px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-size:13px;">Loading projections...</div>`;
  }
  return `
    <div class="proj-note">
      <b>Baseline:</b> ${PROJECTIONS.baseline_season} season stats → <b>${PROJECTIONS.projection_season}</b> Week 1, using each player's real current team, real Week 1 opponent, and opponent matchup strength.
      Rows marked <span class="flag-changed">CHANGED TEAMS</span> switched teams since the baseline season — treat with extra caution. Players with no baseline season data (mostly rookies) show as <span class="flag-nodata">no data</span>.
    </div>
    ${buildProjToolbar()}
    <div class="scroll-hint">← Swipe table to see all columns →</div>
    <div style="overflow-x:auto; overflow-y:auto; max-height: calc(100vh - 260px); -webkit-overflow-scrolling:touch;">
      <table class="proj">
        <thead><tr><th>Player</th><th>Pos</th><th>Team</th><th>Wk1 Opp</th><th>Grade</th><th>Baseline Avg</th><th>Projected</th></tr></thead>
        <tbody id="projTableBody"></tbody>
      </table>
    </div>
  `;
}

function buildProjPosFilters() {
  const el = document.getElementById('projPosFilters');
  if (!el) return;
  el.innerHTML = POSITIONS.map(p => `<div class="pos-chip ${p===projFilter?'active':''}" data-pos="${p}">${p}</div>`).join('');
  el.querySelectorAll('.pos-chip').forEach(chip => {
    chip.addEventListener('click', () => { projFilter = chip.dataset.pos; renderProjTable(); });
  });
}

function renderProjTable() {
  const body = document.getElementById('projTableBody');
  if (!body || !PROJECTIONS) return;
  let list = PROJECTIONS.players;
  if (projFilter !== 'ALL') list = list.filter(p => p.position === projFilter);
  if (projSearchQuery) list = list.filter(p => p.name.toLowerCase().includes(projSearchQuery) || (p.current_team||'').toLowerCase().includes(projSearchQuery));
  list = [...list].sort((a,b) => (b.projected_points ?? -1) - (a.projected_points ?? -1));

  body.innerHTML = list.slice(0, 150).map(p => {
    if (p.rookie_or_no_data) {
      return `<tr>
        <td class="name-cell">${p.name}</td>
        <td>${p.position}</td>
        <td>${p.current_team}</td>
        <td>${p.week1_opponent || '—'}</td>
        <td colspan="3" class="flag-nodata">no baseline data</td>
      </tr>`;
    }
    const changedBadge = p.team_changed ? `<span class="flag-changed">CHANGED TEAMS</span>` : '';
    return `<tr>
      <td class="name-cell">${p.name}${changedBadge}</td>
      <td>${p.position}</td>
      <td>${p.current_team}</td>
      <td>${p.week1_opponent || '—'}</td>
      <td class="${projGradeClass(p.grade)}">${p.grade}</td>
      <td>${p.baseline_avg}</td>
      <td class="proj-pts">${p.projected_points}</td>
    </tr>`;
  }).join('');
}

function renderAppShell() {
  const grid = document.getElementById('appGrid');
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === activeView));

  if (activeView === 'profiles') {
    grid.className = 'app';
    grid.innerHTML = profileShellHTML();
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase().trim();
      buildRail();
    });
    buildPosFilters();
    buildRail();
    renderProfile();
  } else {
    grid.className = '';
    grid.innerHTML = projectionsShellHTML();
    if (PROJECTIONS) {
      const searchEl = document.getElementById('projSearch');
      if (searchEl) searchEl.addEventListener('input', (e) => { projSearchQuery = e.target.value.toLowerCase().trim(); renderProjTable(); });
      buildProjPosFilters();
      renderProjTable();
    }
  }
}

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => { activeView = tab.dataset.view; renderAppShell(); });
});

async function init() {
  document.getElementById('appGrid').innerHTML = `<div style="padding:60px 28px;color:var(--text-muted);font-family:'IBM Plex Mono',monospace;font-size:13px;">Loading real season data...</div>`;
  try {
    const [searchRes, playerRes, projRes] = await Promise.all([
      fetch('./data/search_index.json'),
      fetch('./data/players.json'),
      fetch('./data/projections_week1.json'),
    ]);
    SEARCH_INDEX = await searchRes.json();
    PLAYER_DATA = await playerRes.json();
    PROJECTIONS = await projRes.json();
  } catch (err) {
    document.getElementById('appGrid').innerHTML = `<div style="padding:60px 28px;color:var(--signal-red);font-family:'IBM Plex Mono',monospace;font-size:13px;">Could not load one or more data files (search_index.json / players.json / projections_week1.json).</div>`;
    return;
  }
  buildTicker();
  activeName = [...SEARCH_INDEX].sort((a,b)=>b.avg-a.avg)[0].name;
  renderAppShell();
}

init();
</script>
</body>
</html>
