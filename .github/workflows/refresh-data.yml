name: Refresh player data

on:
  schedule:
    # Every Tuesday at 9am UTC (after Monday Night Football wraps up)
    - cron: "0 9 * * 2"
  workflow_dispatch: {}  # lets you also trigger this manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run data pipeline
        run: python scripts/build_data.py

      - name: Commit updated data
        run: |
          git config user.name "gridiron-bot"
          git config user.email "actions@github.com"
          git add data/players.json data/search_index.json
          git diff --quiet --cached || git commit -m "Auto-refresh player data"
          git push
